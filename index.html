    <!-- Menggunakan Lucide Icons untuk ikon tombol -->
    <script src="https://unpkg.com"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* Kontainer Utama Feed */
        .feed-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Sembunyikan scrollbar Firefox */
            background: #111;
            border-radius: 14px;
            position: relative;
        }
        .feed-container::-webkit-scrollbar {
            display: none; /* Sembunyikan scrollbar Chrome/Safari */
        }
        /* Setiap Item Video */
        .video-card {
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Overlay Iklan (Diperbaiki: Sesuai ukuran script 300x250) */
        .ad-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 250px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Informasi Judul/Keterangan di Bawah */
        .video-info {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 80px;
            z-index: 5;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        .video-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        /* Sidebar Tombol Interaksi */
        .interaction-sidebar {
            position: absolute;
            right: 15px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
            align-items: center;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            gap: 5px;
        }
        .icon-btn i {
            width: 28px;
            height: 28px;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.8));
        }
        .icon-btn.active i {
            color: #ff3b30; /* Warna merah saat di-like */
        }
        /* Optimasi Mobile */
        @media (max-width: 600px) {
            .feed-container {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>

    <script>
        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        // Fitur Autoplay saat video di-scroll (Mendeteksi video yang aktif di layar)
        const container = document.querySelector('.feed-container');
        const videos = document.querySelectorAll('video');

        const observerOptions = {
            root: container,
            threshold: 0.6 // Video harus terlihat 60% baru berputar
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    video.play().catch(error => console.log("Autoplay diblokir browser:", error));
                } else {
                    video.pause();
                    video.currentTime = 0; // Reset ke awal jika di-scroll pergi
                }
            });
        }, observerOptions);

        videos.forEach(video => {
            observer.observe(video);
            // Proteksi klik kanan download
            video.addEventListener('contextmenu', e => e.preventDefault());
        });

        // Logika Tombol Like
        function toggleLike(btn) {
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            if (btn.classList.contains('active')) {
                icon.setAttribute('data-lucide', 'heart-handshake'); // atau tetap heart tapi ganti warna via CSS
                btn.style.color = '#ff3b30';
            } else {
                btn.style.color = '#fff';
            }
        }

        // Logika Tombol Share
        function shareVideo() {
            if (navigator.share) {
                navigator.share({
                    title: 'Tonton Video Lucu Ini',
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert('Tautan disalin ke papan klip!');
                navigator.clipboard.writeText(window.location.href);
            }
        }
    </script>
